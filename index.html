<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Native Kanban Tasks</title>
  <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title-block">
        <p class="app-kicker">Task System</p>
        <h1 class="app-title">Kanban brutalista nativo</h1>
      </div>
      <div class="app-header__actions">
        <button class="button button-ghost js-export-tasks" type="button">Exportar JSON</button>
        <label class="button button-ghost app-import-button">
          Importar JSON
          <input class="js-import-tasks" type="file" accept="application/json" hidden>
        </label>
        <button class="button button-primary js-open-create-dialog" type="button">Nueva tarea</button>
      </div>
    </header>
    <main class="app-main">
      <section class="board-summary js-board-summary" aria-label="Resumen del tablero"></section>
      <section class="activity-log js-activity-log" aria-label="Actividad reciente"></section>
      <section class="filter-panel" aria-label="Filtros del tablero">
        <label class="filter-panel__field">
          <span class="filter-panel__label">Buscar</span>
          <input class="form-field__input js-filter-query" type="search" placeholder="Filtrar por titulo o descripcion">
        </label>
        <label class="filter-panel__field">
          <span class="filter-panel__label">Estado</span>
          <select class="form-field__input js-filter-status">
            <option value="">Todos</option>
            <option value="planificada">Planificada</option>
            <option value="en desarrollo">En desarrollo</option>
            <option value="completada">Completada</option>
          </select>
        </label>
      </section>
      <section class="board-section js-board-section" aria-label="Tablero de tareas"></section>
    </main>
  </div>

  <dialog class="task-dialog js-task-dialog">
    <form class="task-form js-task-form" method="dialog">
      <header class="dialog-header">
        <h2 class="dialog-title">Crear tarea</h2>
        <button class="button button-ghost js-close-create-dialog" type="button" aria-label="Cerrar dialogo">Cerrar</button>
      </header>
      <div class="dialog-content js-task-form-fields"></div>
      <footer class="dialog-footer">
        <button class="button button-ghost js-close-create-dialog" type="button">Cancelar</button>
        <button class="button button-primary" type="submit">Guardar tarea</button>
      </footer>
    </form>
  </dialog>

  <dialog class="task-dialog js-task-detail-dialog">
    <div class="task-detail js-task-detail-content"></div>
  </dialog>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
